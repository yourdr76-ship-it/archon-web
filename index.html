<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archon Supreme Command</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00f3; --bg: #020202; --card: rgba(15,15,15,0.9); }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 15px; }
        
        /* Glitch Animation */
        .glitch { font-size: 22px; font-weight: bold; text-align: center; text-transform: uppercase; animation: glitch 1s infinite; margin-top: 10px; }
        @keyframes glitch { 0% { text-shadow: 2px 0 #f0f, -2px 0 #0ff; } 50% { text-shadow: -2px 0 #f0f, 2px 0 #0ff; } 100% { text-shadow: 2px 0 #f0f, -2px 0 #0ff; } }

        #map { height: 160px; border: 1px solid #333; border-radius: 12px; margin: 15px 0; filter: contrast(1.2) brightness(0.8) hue-rotate(160deg); }
        .panel { background: var(--card); border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 15px; opacity: 0; transform: translateY(20px); transition: 0.5s all; }
        .panel.visible { opacity: 1; transform: translateY(0); }
        
        .admin-box { border-color: var(--pink) !important; box-shadow: 0 0 15px rgba(255,0,243,0.1); }
        input { background: #000; color: var(--pink); border: 1px solid var(--pink); padding: 8px; width: 60%; margin-top: 10px; }
        button { background: var(--pink); color: #000; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; }
        
        .data-row { border-bottom: 1px solid #222; padding: 8px 0; font-size: 13px; }
        .label { color: #888; font-size: 11px; }
    </style>
</head>
<body>
    <div class="glitch">ARCHON_SUPREME_OSINT</div>
    <div id="status" style="text-align: center; font-size: 11px; margin-bottom: 10px;">[ UPLINK_STABLE ]</div>
    
    <div id="map"></div>
    <div id="output"></div>

    <div class="panel admin-box" id="admin-panel" style="display:none;">
        <h4 style="color:var(--pink); margin:0;">[ SECURITY_OVERRIDE: ADD_ADMIN ]</h4>
        <input type="number" id="admin-id" placeholder="Telegram UserID">
        <button onclick="grantAccess()">AUTHORIZE</button>
        <div id="admin-log" style="font-size:10px; margin-top:10px; color:var(--pink);"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target'), type = p.get('type'), uid = p.get('uid');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        const MASTER_ID = "123456789"; // <--- MUST MATCH MASTER_ID IN PYTHON

        async function init() {
            if(!target) return;
            if(uid === MASTER_ID) document.getElementById('admin-panel').style.display = 'block';

            try {
                const r = await fetch(`${BACKEND}/api/scan?target=${encodeURIComponent(target)}&type=${type}&uid=${uid}`);
                const data = await r.json();
                
                // Map Logic
                let lat = data.geo?.area?.latitude || 0, lon = data.geo?.area?.longitude || 0;
                let map = L.map('map', {zoomControl: false}).setView([lat, lon], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

                const out = document.getElementById('output');

                // Module: Web Mentions
                if(data.web && data.web.results) {
                    let m = createModule("WEB_INTELLIGENCE");
                    data.web.results.slice(0,3).forEach(res => {
                        m.innerHTML += `<div class="data-row"><div class="label">SOURCE</div>${res.title}</div>`;
                    });
                    out.appendChild(m);
                }

                // Module: Dark Web
                if(data.leaks && data.leaks.result) {
                    let m = createModule("DARK_WEB_EXPOSURE");
                    m.style.borderColor = 'red';
                    data.leaks.result.forEach(l => m.innerHTML += `<div class="data-row" style="color:red;">[!] ${l.line}</div>`);
                    out.appendChild(m);
                }

                document.querySelectorAll('.panel').forEach(p => p.classList.add('visible'));
            } catch(e) { document.getElementById('status').innerText = "CONNECTION_LOST"; }
        }

        async function grantAccess() {
            const newId = document.getElementById('admin-id').value;
            const log = document.getElementById('admin-log');
            log.innerText = "> INITIATING HANDSHAKE...";
            const r = await fetch(`${BACKEND}/api/add_admin?uid=${uid}&new_id=${newId}`);
            const d = await r.json();
            log.innerText = d.status === "SUCCESS" ? `> USER_${newId}_AUTHORIZED` : `> ${d.error}`;
        }

        function createModule(title) {
            const div = document.createElement('div');
            div.className = 'panel';
            div.innerHTML = `<h5 style="margin:0 0 10px 0; border-bottom:1px solid #333;">[ ${title} ]</h5>`;
            return div;
        }

        document.body.onclick = () => { init(); document.body.onclick = null; };
    </script>
</body>
</html>
