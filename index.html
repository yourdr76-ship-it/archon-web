<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON INTELLIGENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Share+Tech+Mono&display=swap');
        :root { --archon-cyan: #00ffcc; --archon-warn: #ffb700; --archon-red: #ff2a2a; --bg: #010305; --glass: rgba(2, 10, 15, 0.85); }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; user-select: none; }
        
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; padding: 20px; pointer-events: none; }
        .interactive { pointer-events: auto; }
        
        .archon-title { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 6px; text-align: center; text-shadow: 0 0 20px var(--archon-cyan); margin-bottom: 20px; color: var(--archon-cyan); }
        
        .target-box { background: var(--glass); border-left: 4px solid var(--archon-cyan); padding: 18px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(12px); position: relative; overflow: hidden; margin-bottom: 15px; }
        .scanning-laser { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--archon-warn); opacity: 0; z-index: 5; }
        body.hacking .scanning-laser { opacity: 1; animation: scanSweep 2s linear infinite; }
        .progress-bar { height: 4px; width: 0%; background: var(--archon-cyan); transition: 0.6s; box-shadow: 0 0 15px var(--archon-cyan); margin-bottom: 20px; }
        
        .btn { background: rgba(0,0,0,0.7); border: 1px solid var(--archon-cyan); color: var(--archon-cyan); padding: 16px; font-family: 'Orbitron', sans-serif; font-size: 13px; text-align: center; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;}
        .btn:active { background: var(--archon-cyan); color: #000; transform: scale(0.98); }
        
        .card { background: var(--glass); border-top: 2px solid var(--archon-cyan); padding: 15px; animation: cardIn 0.5s ease-out forwards; margin-bottom: 12px; }
        @keyframes cardIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        .terminal { height: 120px; background: rgba(0,2,5,0.9); border: 1px solid #1a1a1a; padding: 10px; font-size: 11px; color: #0f0; overflow-y: auto; border-top: 2px solid #333; position: relative; }
        .log-line { margin-bottom: 4px; }
        .log-line.kern { color: #555; font-size: 9px; }
        
        @media (min-width: 768px) { .archon-title { font-size: 38px; } .target-box { padding: 25px; } .terminal { height: 200px; font-size: 13px; } .btn { font-size: 16px; } }
        @keyframes scanSweep { 0% { top: -5%; } 100% { top: 105%; } }
    </style>
</head>
<body>
    <div id="boot-screen">
        <div style="font-family:'Orbitron'; font-size:26px; font-weight:900; color:var(--archon-cyan); letter-spacing:10px; text-shadow:0 0 20px var(--archon-cyan);">ARCHON INTELLIGENCE</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div class="archon-title">ARCHON INTELLIGENCE</div>
        
        <div class="target-box interactive">
            <div class="scanning-laser"></div>
            <div>
                <div style="font-size:10px; color:#555;">NODE_IDENTIFIER</div>
                <div id="target-id" style="font-family:'Orbitron'; font-size:20px; color:var(--archon-cyan);">---</div>
            </div>
            <div id="sys-status" style="font-size:10px; border:1px solid var(--archon-cyan); padding:5px 10px;">STANDBY</div>
        </div>
        
        <div class="progress-bar" id="prog-bar"></div>
        
        <div class="interactive" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
            <div class="btn" onclick="start()">Execute Omni-Chain</div>
            <div class="btn" onclick="location.reload()" style="border-color:#444; color:#666;">Purge</div>
        </div>
        
        <div class="stream interactive" id="stream"></div>
        <div class="terminal interactive" id="term"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; const p = new URLSearchParams(window.location.search); const target = p.get('target') || "DEMO";
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        
        setTimeout(() => { document.getElementById('boot-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('boot-screen').remove(); visualDecrypt(document.getElementById('target-id'), target); }, 800); }, 1200);
        
        function visualDecrypt(el, str) { const c = "!<>-_\\/[]{}—=+*^?#_"; let i = 0; const inv = setInterval(() => { el.innerText = str.split("").map((l, idx) => idx < i ? str[idx] : c[Math.floor(Math.random()*c.length)]).join(""); if(i >= str.length) clearInterval(inv); i += 1/3; }, 35); }
        function log(m, c="#0f0", type="") { const e = document.createElement('div'); e.className = `log-line ${type}`; e.innerHTML = `<span style="color:${c}">[${new Date().toISOString().slice(11,19)}] ${m}</span>`; const t = document.getElementById('term'); t.appendChild(e); t.scrollTop = t.scrollHeight; while(t.childNodes.length > 40) t.removeChild(t.firstChild); }
        
        let busy = false; let cur = 0; 
        
        async function start() {
            if(busy) return; busy = true; document.body.classList.add('hacking');
            document.getElementById('sys-status').innerText = "EXTRACTING"; log(`STAGING_CHAIN: ${target}`, "var(--archon-cyan)");
            execute(target, "initial");
        }
        
        async function execute(t, pr) {
            let chat_str = `CALL_STACK::${pr.toUpperCase()}`;
            if (pr === "domain_recon") chat_str = `QUERY::CERT_TRANSPARENCY`;
            const chatter = setInterval(() => { const addr = "0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase(); log(`${chat_str} -> ADDR:${addr} -> OK`, "#444", "kern"); }, 150);
            
            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${encodeURIComponent(t)}&protocol=${pr}&v=${Date.now()}`);
                clearInterval(chatter); const data = await res.json(); render(pr.toUpperCase(), data);
                
                cur++; 
                document.getElementById('prog-bar').style.width = `${Math.min(cur * 15, 90)}%`;
                
                if(data.pivots && data.pivots.length > 0) setTimeout(() => execute(data.pivots[0].t, data.pivots[0].p), 1000);
                else { 
                    document.getElementById('prog-bar').style.width = '100%';
                    log("OMNI-CHAIN COMPLETE", "var(--archon-cyan)"); document.getElementById('sys-status').innerText = "SECURED"; document.body.classList.remove('hacking'); busy = false; 
                }
            } catch(e) { clearInterval(chatter); log("LINK_FAILURE", "var(--archon-red)"); busy = false; }
        }
        
        function render(title, data) {
            const card = document.createElement('div'); card.className = 'card';
            let h = `<div style="font-size:10px; color:var(--archon-cyan); margin-bottom:10px; letter-spacing:2px;">// ${title}</div>`;
            if(data.analysis) Object.entries(data.analysis).forEach(([k, v]) => {
                const isAI = k.includes("Briefing");
                let colorClass = '#fff';
                if(String(v).includes("OPEN") || String(v).includes("EXPOSED") || String(v).includes("Error") || String(v).includes("FLAGGED")) colorClass = 'var(--archon-red)';
                else if(String(v).includes("FOUND") || k.includes("Action") || k.includes("Sources") || k.includes("Banner") || k.includes("Dork") || k.includes("Archive")) colorClass = 'var(--archon-warn)';
                else if(isAI) colorClass = '#b829ff';

                h += `<div style="margin-bottom:8px;"><div style="font-size:9px; color:#555; text-transform:uppercase;">${k.replace(/_/g, ' ')}</div><div id="v-${title}-${k}" style="font-size:${isAI?'14px':'15px'}; color:${colorClass}; margin-top:2px; word-break: break-all; cursor:pointer;">---</div></div>`;
            });
            card.innerHTML = h; document.getElementById('stream').prepend(card);
            Object.entries(data.analysis).forEach(([k, v]) => {
                const el = document.getElementById(`v-${title}-${k}`);
                el.onclick = () => copy(String(v));
                if(k.includes("Briefing") || k.includes("Action") || k.includes("Dork")) { el.textContent = ""; let j=0; const t=setInterval(()=>{el.textContent+=v[j++];if(j>=v.length)clearInterval(t)},15); }
                else el.textContent = v;
            });
        }
        
        function copy(txt) { navigator.clipboard.writeText(txt); try { tg.HapticFeedback.selectionChanged(); } catch(e){} log(`Copied data fragment.`, "var(--archon-cyan)"); }
        
        // --- 🌌 3D PARTICLE SWARM PHYSICS ---
        const sc = new THREE.Scene(); const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const rd = new THREE.WebGLRenderer({ alpha:true, antialias:true }); rd.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(rd.domElement);
        
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(1.2,1), new THREE.MeshBasicMaterial({color:0x00ffcc, wireframe:true, transparent:true, opacity:0.2})); sc.add(core);
        const pGeo = new THREE.BufferGeometry(); const pPos = new Float32Array(600*3); for(let i=0; i<1800; i++) pPos[i] = (Math.random()-0.5)*10;
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3)); const pMat = new THREE.PointsMaterial({size:0.02, color:0x00ffcc, transparent:true, opacity:0.5});
        const pts = new THREE.Points(pGeo, pMat); sc.add(pts); cam.position.z = 5;
        
        function animate() {
            requestAnimationFrame(animate); const h = document.body.classList.contains('hacking');
            core.rotation.y += h ? 0.05 : 0.005; pts.rotation.y += h ? 0.02 : 0.001;
            const s = h ? (1 + Math.sin(Date.now()*0.01)*0.1) : 1; core.scale.set(s,s,s);
            pMat.color.setHex(h ? 0xffb700 : 0x00ffcc); core.material.color.setHex(h ? 0xffb700 : 0x00ffcc); rd.render(sc, cam);
        } animate();
    </script>
</body>
</html>
