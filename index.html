<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archon Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050505; --surf: #0E0E0E; --txt: #BFBFBF; --accent: #7CFFB2; --div: #1A1A1A; }
        body { background: var(--bg); color: var(--txt); font-family: "Courier New", monospace; padding: 20px; margin: 0; text-align: center; }
        .console { background: var(--surf); border: 1px solid var(--div); border-radius: 4px; padding: 15px; text-align: left; min-height: 400px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .neon-txt { color: var(--accent); text-shadow: 0 0 5px var(--accent); font-weight: bold; }
        .loading { animation: pulse 1.5s infinite; color: var(--accent); margin: 20px 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <h2 class="neon-txt">ARCHON INTELLIGENCE v4.0</h2>
    <div id="loader" class="loading" style="display:none;">[ STATUS ] INTERROGATING GLOBAL NODES...</div>
    <div class="console" id="console">> AWAITING PAYLOAD...</div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const params = new URLSearchParams(window.location.search);
        const target = params.get('target');
        const type = params.get('type');
        const uid = params.get('uid');

        if (target && uid) { executeTrace(target, type, uid); }

        async function executeTrace(t, tp, u) {
            const consoleDiv = document.getElementById('console');
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            consoleDiv.innerHTML = `<p>> TARGET: ${t}<br>> PROTOCOL: ${tp.toUpperCase()}_SCAN</p>`;

            try {
                // WE WILL REPLACE THE URL BELOW WITH YOUR RENDER URL IN THE NEXT PHASE
                const response = await fetch(`https://YOUR_RENDER_URL_HERE.onrender.com/api/scan?target=${t}&type=${tp}&uid=${u}`);
                const data = await response.json();
                loader.style.display = 'none';
                
                if(data.error) { consoleDiv.innerHTML += `<p style="color:#FF4C4C">> ERROR: ${data.error}</p>`; return; }

                let res = `<p class="neon-txt">> DECRYPTION COMPLETE</p><hr style="border:0.5px solid var(--div)">`;
                if(tp === 'email') {
                    res += `<p><b>ACTIVE SOCIAL LINKS:</b></p>`;
                    data.socials.forEach(s => { res += `<p style="color:var(--accent)">[+] ${s}</p>`; });
                } else {
                    res += `<p><b>REGION:</b> ${data.location}</p><p><b>CARRIER:</b> ${data.carrier}</p>`;
                }
                consoleDiv.innerHTML = res + `<p>> END OF DATA.</p>`;
            } catch (e) {
                loader.style.display = 'none';
                consoleDiv.innerHTML += `<p style="color:#FF4C4C">> CRITICAL: API MAINFRAME OFFLINE</p>`;
            }
        }
    </script>
</body>
</html>
