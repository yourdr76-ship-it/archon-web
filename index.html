<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.95); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow:hidden; height:100vh;}
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.4;}
        
        .interface { position: relative; z-index: 10; padding: 25px; height: 100vh; display: flex; flex-direction: column; }

        /* Tactical Button Cluster */
        .cluster { display: flex; flex-direction: column; gap: 10px; width: 200px; margin-top: 20px; }
        .proto-btn { 
            background: rgba(0, 255, 204, 0.05); border: 1px solid var(--neon); color: var(--neon);
            padding: 15px; font-size: 10px; letter-spacing: 2px; cursor: pointer; text-align: left;
            transition: 0.3s; clip-path: polygon(0% 0%, 90% 0%, 100% 30%, 100% 100%, 0% 100%);
        }
        .proto-btn:hover { background: rgba(0, 255, 204, 0.2); box-shadow: 0 0 15px var(--neon); }

        /* Access Control */
        .access-panel { border: 1px solid #ff3333; padding: 15px; margin-top: auto; margin-bottom: 30px; width: fit-content; background: rgba(255,0,0,0.05); }
        #access-toggle { color: #ff3333; cursor: pointer; font-size: 11px; text-decoration: underline; font-weight: bold; }

        /* Data Stream */
        #stream { flex-grow: 1; overflow-y: auto; margin-top: 20px; max-width: 400px; }
        .card { background: var(--glass); border-left: 5px solid var(--neon); padding: 20px; margin-bottom: 15px; animation: slideIn 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .row { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0; border-bottom: 1px solid rgba(0, 255, 204, 0.1); }
        .val { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
    </style>
</head>
<body>
    <div id="canvas"></div>
    
    <div class="interface">
        <div style="letter-spacing:10px; color:var(--neon); font-size:10px; font-weight:900;">ARCHON INTELLIGENCE</div>
        <div id="target-id" style="font-size:22px; margin: 15px 0; color: #fff;">TARGET: LOCKING...</div>

        <div class="cluster" id="selector">
            <div style="font-size: 9px; opacity: 0.5; margin-bottom: 5px;">COMMAND NODES:</div>
            <button class="proto-btn" onclick="trigger('ip')">NETWORK INTERCEPT</button>
            <button class="proto-btn" onclick="trigger('gstin')">FINANCIAL PIVOT</button>
            <button class="proto-btn" onclick="trigger('email')">IDENTITY CASCADE</button>
        </div>

        <div id="stream"></div>

        <div class="access-panel" id="access-box">
            <span style="font-size: 10px; color: #ff3333;">UPLINK STATUS: [ DISCONNECTED ]</span><br>
            <span id="access-toggle" onclick="grantAccess()">[ GIVE SYSTEM ACCESS ]</span>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const target = params.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com"; 
        
        document.getElementById('target-id').innerText = target || "NO_TARGET";

        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.rate = 1.1; window.speechSynthesis.speak(u); }

        function grantAccess() {
            document.getElementById('access-box').style.borderColor = "#00ffcc";
            document.getElementById('access-box').style.background = "rgba(0, 255, 204, 0.05)";
            document.getElementById('access-box').innerHTML = "<span style='color:#00ffcc; font-size:10px;'>UPLINK STATUS: [ SECURE ]</span>";
            speak("Access granted. Archon Intelligence is synchronized with Midnapore node.");
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }

        async function trigger(protocol) {
            if(document.getElementById('access-toggle')) {
                speak("Access denied. Command uplink not established.");
                return;
            }
            speak("Initiating " + protocol + " protocol.");

            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${target}&protocol=${protocol}`);
                const data = await res.json();
                render(protocol.toUpperCase(), data);
            } catch (e) {
                speak("Extraction failed. Backend node timeout.");
            }
        }

        function render(title, content) {
            const card = document.createElement('div');
            card.className = 'card';
            let html = `<div style="color:var(--neon); font-size:10px; margin-bottom:10px;">[ ${title}_ANALYSIS ]</div>`;
            
            for(let [k, v] of Object.entries(content)) {
                if(typeof v === 'object') v = JSON.stringify(v);
                html += `<div class="row"><span>${k.toUpperCase()}</span><span class="val">${v}</span></div>`;
            }
            
            card.innerHTML = html;
            document.getElementById('stream').prepend(card);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }

        // --- 🧊 3D CORE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += 0.005; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
