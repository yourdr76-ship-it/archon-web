<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Archon Ultra-Elite Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --neon: #00f3ff; --pink: #ff00f3; --bg: #010101; --dim: rgba(0, 243, 255, 0.1); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; height: 100%; overflow: hidden; }

        /* CRT & Scanline Effects */
        .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 100; pointer-events: none; background-size: 100% 2px, 3px 100%; }
        .flicker { animation: flicker 0.15s infinite; }
        @keyframes flicker { 0% { opacity: 0.97; } 50% { opacity: 1; } 100% { opacity: 0.98; } }

        /* Authorization Screen */
        #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .fingerprint { width: 80px; height: 80px; border: 2px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px var(--dim); }
        .fingerprint:active { transform: scale(0.9); box-shadow: 0 0 40px var(--neon); }

        /* Main Dashboard */
        .container { padding: 15px; height: 100vh; box-sizing: border-box; display: flex; flex-direction: column; opacity: 0; transition: 1s opacity; }
        .glitch { font-size: 1.5rem; font-weight: bold; text-align: center; text-transform: uppercase; margin-bottom: 10px; color: #fff; text-shadow: 2px 0 var(--pink), -2px 0 var(--neon); }

        #map { height: 150px; width: 100%; border: 1px solid #333; border-radius: 8px; margin-bottom: 10px; filter: invert(100%) hue-rotate(180deg) brightness(0.8); }
        
        .terminal-log { flex: 1; background: #000; border: 1px solid #222; padding: 10px; font-size: 11px; overflow-y: auto; margin-bottom: 10px; color: #00ff41; }
        .data-card { background: rgba(15,15,15,0.95); border: 1px solid #333; padding: 12px; border-radius: 6px; margin-bottom: 10px; display: none; animation: slideIn 0.5s forwards; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .admin-btn { border: 1px solid var(--pink); color: var(--pink); padding: 5px; font-size: 10px; text-align: center; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body class="flicker">
    <div class="scanlines"></div>

    <div id="auth-screen">
        <div class="glitch">SECURITY_CHECK</div>
        <div class="fingerprint" onclick="startSequence()">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 11c0 3.517-2.167 6.524-5.222 7.738M12 11c0-3.517 2.167-6.524 5.222-7.738M12 11V3m0 8v18"/></svg>
        </div>
        <p style="font-size: 10px; margin-top: 15px; letter-spacing: 2px;">TAP TO AUTHORIZE UPLINK</p>
    </div>

    <div class="container" id="main-ui">
        <div class="glitch">ARCHON_OSINT_SUPREME</div>
        
        <div id="map"></div>

        <div class="terminal-log" id="logs">
            > WAITING FOR HANDSHAKE...
        </div>

        <div id="results-area">
            </div>

        <div id="admin-module" style="display:none;">
            <div class="admin-btn" onclick="toggleAdmin()">[ OPEN SECURITY OVERRIDE ]</div>
            <div id="admin-panel" style="display:none; padding:10px; border: 1px solid var(--pink); margin-top:5px;">
                <input type="number" id="new-id" placeholder="Telegram UserID" style="background:#000; color:var(--pink); border:1px solid var(--pink); width:70%;">
                <button onclick="addAdmin()" style="background:var(--pink); border:none; color:#000; padding:5px;">GRANT</button>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target'), type = p.get('type'), uid = p.get('uid');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        const MASTER_ID = "8312795263"; // REPLACE WITH YOUR ID

        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, d, t='sine') {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.type = t; o.frequency.value = f; o.connect(g); g.connect(ctx.destination);
            g.gain.setValueAtTime(0.1, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + d);
            o.start(); o.stop(ctx.currentTime + d);
        }

        function log(msg, color="#00ff41") {
            const l = document.getElementById('logs');
            const d = document.createElement('div');
            d.innerHTML = `> ${msg}`; d.style.color = color;
            l.appendChild(d); l.scrollTop = l.scrollHeight;
            playSound(800, 0.05);
        }

        async function startSequence() {
            if(ctx.state === 'suspended') ctx.resume();
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-ui').style.opacity = '1';
            
            if(uid === MASTER_ID) document.getElementById('admin-module').style.display = 'block';

            log("HANDSHAKE ESTABLISHED.");
            log(`TARGETING: ${target}`);
            log(`PROTOCOL: ${type.toUpperCase()}_RECON`);

            executeScan();
        }

        async function executeScan() {
            try {
                const r = await fetch(`${BACKEND}/api/scan?target=${encodeURIComponent(target)}&type=${type}&uid=${uid}`);
                const data = await r.json();

                if(data.error) { log(`CRITICAL ERROR: ${data.error}`, "red"); return; }

                // Map Logic
                let lat = data.geo?.area?.latitude || 0, lon = data.geo?.area?.longitude || 0;
                let map = L.map('map', {zoomControl: false}).setView([lat, lon], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                L.circle([lat, lon], {radius: 1000, color: '#00f3ff'}).addTo(map);

                log("DECRYPTION SUCCESSFUL. PARSING PAYLOAD...");
                renderData(data);
            } catch(e) { log("CONNECTION LOST. RE-ROUTING...", "red"); }
        }

        function renderData(data) {
            const area = document.getElementById('results-area');
            
            // 1. Module: Social
            if(data.social) {
                const c = createCard("SOCIAL_INTEL");
                c.innerHTML += `<div style="font-size:12px;">Reputation: ${data.social.reputation || 'N/A'}</div>`;
                if(data.social.sources) c.innerHTML += `<div style="color:var(--neon); font-size:10px;">Links: ${data.social.sources.join(' | ')}</div>`;
                area.appendChild(c);
            }

            // 2. Module: Breaches
            if(data.leaks && data.leaks.result) {
                const c = createCard("DARK_WEB_EXPOSURE", "#ff3e3e");
                data.leaks.result.slice(0,5).forEach(l => c.innerHTML += `<div style="font-size:10px;">[!] ${l.line}</div>`);
                area.appendChild(c);
                playSound(200, 0.5, 'square');
            }

            log("PAYLOAD FULLY RENDERED. STANDING BY.");
        }

        function createCard(title, border="#333") {
            const d = document.createElement('div');
            d.className = 'data-card'; d.style.display = 'block'; d.style.borderColor = border;
            d.innerHTML = `<div style="font-size:11px; border-bottom:1px solid #222; margin-bottom:5px; color:${border==='#333'? 'var(--neon)' : border}">[ ${title} ]</div>`;
            return d;
        }

        // Admin Functions
        function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'none' ? 'block' : 'none'; }
        async function addAdmin() {
            const id = document.getElementById('new-id').value;
            log(`AUTHORIZING USER_${id}...`);
            const r = await fetch(`${BACKEND}/api/add_admin?uid=${uid}&new_id=${id}`);
            const d = await r.json();
            log(d.status === "SUCCESS" ? "ACCESS GRANTED." : "AUTHORIZATION FAILED.", d.status === "SUCCESS" ? "#00ff41" : "red");
        }
    </script>
</body>
</html>
