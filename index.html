<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARCHON INTELLIGENCE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00ff41; --danger: #ff003c; --bg: #030303; --panel: rgba(5, 10, 5, 0.85); }
        * { box-sizing: border-box; }
        body { margin:0; padding:0; background:var(--bg); color:var(--neon); font-family:'Courier New', monospace; overflow-x:hidden; user-select:none; perspective: 1000px; height: 100vh;}
        
        #network-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity: 0.6; }
        .scanlines { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); background-size:100% 4px; pointer-events:none; z-index:9999; }
        
        /* Moving Laser Line */
        .laser-scanner { position: fixed; top: -10px; left: 0; width: 100%; height: 2px; background: var(--neon); box-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); z-index: 9998; opacity: 0.5; animation: scanLaser 6s ease-in-out infinite; pointer-events: none;}
        @keyframes scanLaser { 0% { top: -10px; } 50% { top: 100vh; } 100% { top: -10px; } }

        .cyber-grid { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px); background-size: 30px 30px; z-index: -1; transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation: gridMove 20s linear infinite; }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 30px; } }

        .header { text-align:center; padding:20px; border-bottom:1px solid #222; background:rgba(2,2,2,0.9); position:relative; z-index:10; box-shadow: 0 5px 20px rgba(0,255,65,0.1); }
        .glitch { font-size:1.6rem; font-weight:bold; letter-spacing:4px; text-shadow:2px 0 red, -2px 0 blue; animation: g 3s infinite; text-transform: uppercase;}
        @keyframes g { 0%, 100% { transform:skew(0); opacity:1; } 5% { transform:skew(-5deg); opacity:0.8; } 10% { transform:skew(5deg); } }

        .terminal { background:rgba(0,0,0,0.8); border:1px solid #111; margin:15px; padding:15px; font-size:11px; height:130px; overflow-y:auto; color:#00ff41; box-shadow: inset 0 0 20px #000; border-radius: 4px; border-left: 2px solid var(--neon); }
        
        .module { background:var(--panel); border:1px solid #1a1a1a; border-left:3px solid var(--neon); margin:15px; padding:15px; opacity:0; transform: translateY(30px) rotateX(10deg); transition: transform 0.1s ease-out, box-shadow 0.1s, opacity 0.5s; border-radius: 0 8px 8px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform-style: preserve-3d; }
        .module.show { opacity:1; transform: translateY(0) rotateX(0); }
        
        .data-row { border-bottom:1px dashed #222; padding:10px 0; font-size:12px; display:flex; justify-content:space-between; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden;}
        .data-row::before { content: ''; position: absolute; left: -100%; top: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,65,0.2), transparent); transition: 0.3s; }
        .data-row:hover::before { left: 100%; transition: 0.5s; }
        .data-row:hover { background:rgba(0, 255, 65, 0.05); padding-left:8px; }
        .data-row:active { background:var(--neon); color:#000; transform: scale(0.98); }
        .lbl { color:#666; font-weight: bold; pointer-events:none;}
        .val { font-weight: bold; text-align: right; word-break: break-all; max-width: 65%; pointer-events:none; text-shadow: 0 0 5px rgba(0,255,65,0.5);}
        .val.found { color: var(--neon); text-shadow: 0 0 8px var(--neon); }
        .val.danger { color: var(--danger); text-shadow: 0 0 8px var(--danger); }

        .btn { position: relative; display:block; text-align:center; border:1px solid var(--neon); padding:14px; margin-top:15px; color:var(--neon); font-size:12px; cursor:pointer; font-weight:bold; background: transparent; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; overflow: hidden; }
        .btn:hover { background: rgba(0,255,65,0.1); box-shadow: 0 0 15px rgba(0,255,65,0.3); letter-spacing: 3px; }
        .btn:active { background:var(--neon); color:#000; transform: scale(0.95); }

        /* Centered Layout Fixes */
        #auth, #radar-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; backdrop-filter: blur(8px); transition: 0.3s opacity;}
        
        .core { width:120px; height:120px; border:2px dashed var(--neon); border-radius:50%; display:flex; align-items:center; justify-content:center; animation:spin 8s linear infinite; cursor: pointer; box-shadow: 0 0 40px rgba(0,255,65,0.2); transition: 0.3s; margin: 0 auto;}
        .core:hover { border-color: #fff; animation:spin 2s linear infinite; transform: scale(1.1); box-shadow: 0 0 60px rgba(0,255,65,0.6); }
        @keyframes spin { 100% { transform:rotate(360deg); } }
        
        .radar { width: 140px; height: 140px; border-radius: 50%; border: 1px solid rgba(0,255,65,0.3); position: relative; overflow: hidden; margin: 0 auto;}
        .radar::before { content: ''; position: absolute; top: 50%; left: 50%; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(0,255,65,0) 50%, rgba(0,255,65,0.8) 100%); transform-origin: 0 0; animation: radarScan 1.5s linear infinite; }
        @keyframes radarScan { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* Grid container for social media */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;}
        .social-btn { border: 1px solid #333; padding: 10px; text-align: center; font-size: 10px; cursor: pointer; color: #aaa; transition: 0.2s;}
        .social-btn:hover { border-color: var(--neon); color: var(--neon); background: rgba(0,255,65,0.1); box-shadow: 0 0 10px rgba(0,255,65,0.2);}
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="cyber-grid"></div>
    <div class="laser-scanner" id="laser" style="display:none;"></div>
    <canvas id="network-canvas"></canvas>

    <div id="auth" onclick="startRadar()">
        <div style="text-align: center;">
            <div class="glitch" style="margin-bottom:60px;">ARCHON INTELLIGENCE</div>
            <div class="core"><div style="width:25px; height:25px; background:var(--neon); border-radius:50%; box-shadow: 0 0 40px var(--neon); animation: pulse 1s infinite;"></div></div>
            <div style="font-size:12px; margin-top:50px; letter-spacing:5px; opacity:0.9; animation: blink 1.5s infinite; font-weight:bold;">TAP TO INITIATE UPLINK</div>
        </div>
    </div>

    <div id="radar-screen" style="display:none; opacity: 0;">
        <div style="text-align: center;">
            <div class="radar"></div>
            <div id="radar-text" style="margin-top: 40px; font-size: 13px; letter-spacing: 4px; color: var(--neon); animation: blink 1s infinite; font-weight:bold;">INTERROGATING TARGET...</div>
            <div style="width: 250px; height: 3px; background: #222; margin: 20px auto 0 auto; position: relative;">
                <div id="progress-bar" style="height: 100%; width: 0%; background: var(--neon); transition: 0.2s; box-shadow: 0 0 10px var(--neon);"></div>
            </div>
        </div>
    </div>

    <div class="header" id="main-header" style="display:none;">
        <div class="glitch">ARCHON INTELLIGENCE</div>
        <div style="font-size:10px; color:#555; margin-top:8px; letter-spacing: 2px; font-weight:bold;" id="target-display">UPLINK ACTIVE</div>
    </div>

    <div class="terminal" id="logs" style="display:none;"></div>
    <div id="dashboard"></div>

    <script>
        let tg; try { tg = window.Telegram.WebApp; tg.expand(); tg.ready(); } catch(e) {}
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target'), type = p.get('type'), uid = p.get('uid');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";

        const canvas = document.getElementById('network-canvas'); const ctxC = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particlesArray = []; let mouse = { x: null, y: null, radius: 100 };
        
        window.addEventListener('mousemove', function(event) { mouse.x = event.x; mouse.y = event.y; });
        window.addEventListener('touchmove', function(event) { mouse.x = event.touches[0].clientX; mouse.y = event.touches[0].clientY; });
        window.addEventListener('mouseout', function() { mouse.x = undefined; mouse.y = undefined; });

        class Particle {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*2 + 1; this.speedX = (Math.random()-0.5)*1; this.speedY = (Math.random()-0.5)*1; }
            update() { 
                this.x += this.speedX; this.y += this.speedY; 
                if(this.x > canvas.width || this.x < 0) this.speedX *= -1; 
                if(this.y > canvas.height || this.y < 0) this.speedY *= -1; 
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius) { this.x -= dx/20; this.y -= dy/20; }
            }
            draw() { ctxC.fillStyle = 'rgba(0,255,65,0.8)'; ctxC.beginPath(); ctxC.arc(this.x, this.y, this.size, 0, Math.PI*2); ctxC.fill(); }
        }
        for(let i=0; i<60; i++) particlesArray.push(new Particle());
        
        function animateParticles() {
            ctxC.clearRect(0,0,canvas.width,canvas.height);
            for(let i=0; i<particlesArray.length; i++) {
                particlesArray[i].update(); particlesArray[i].draw();
                for(let j=i; j<particlesArray.length; j++) {
                    const dx = particlesArray[i].x - particlesArray[j].x; const dy = particlesArray[i].y - particlesArray[j].y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    if(distance < 90) { 
                        ctxC.beginPath(); ctxC.strokeStyle = `rgba(0,255,65,${1 - distance/90})`; ctxC.lineWidth = 1; 
                        ctxC.moveTo(particlesArray[i].x, particlesArray[i].y); ctxC.lineTo(particlesArray[j].x, particlesArray[j].y); ctxC.stroke(); 
                    }
                }
            } requestAnimationFrame(animateParticles);
        } animateParticles();

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playBeep(freq, type, duration, vol=0.05) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function apply3DTilt(element) {
            element.addEventListener('mousemove', (e) => {
                const rect = element.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                const centerX = rect.width / 2; const centerY = rect.height / 2;
                const tiltX = ((y - centerY) / centerY) * -10; const tiltY = ((x - centerX) / centerX) * 10;
                element.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.02)`;
            });
            element.addEventListener('mouseleave', () => { element.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale(1)`; });
        }

        async function typeLog(m, color="var(--neon)") {
            const l = document.getElementById('logs'); const d = document.createElement('div'); d.style.color = color; l.appendChild(d);
            let i = 0; playBeep(800, 'square', 0.05, 0.01);
            return new Promise(resolve => {
                const int = setInterval(() => {
                    d.innerHTML = `> [SYS] ${m.substring(0, i)}<span style="opacity:0.8">_</span>`;
                    l.scrollTop = l.scrollHeight;
                    if(i++ >= m.length) { clearInterval(int); d.innerHTML = `> [SYS] ${m}`; resolve(); }
                }, 10);
            });
        }

        function decryptText(element, finalString) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*X"; let iterations = 0;
            const interval = setInterval(() => {
                element.innerText = finalString.split("").map((letter, index) => {
                    if(index < iterations) return finalString[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
                if(iterations >= finalString.length) clearInterval(interval);
                iterations += 1/2; 
            }, 30);
        }

        function buildRow(label, value, customClass="") {
            const cleanVal = value || 'N/A';
            const row = document.createElement('div'); row.className = 'data-row';
            row.onclick = () => { 
                playBeep(1200, 'sine', 0.1, 0.1); 
                navigator.clipboard.writeText(cleanVal); 
                const o = row.innerHTML; 
                row.innerHTML = `<span style="color:#000; width:100%; text-align:center; font-weight:bold; letter-spacing: 2px;">[ DATA_COPIED ]</span>`; 
                row.style.background = "var(--neon)"; 
                if(tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                setTimeout(() => { row.innerHTML = o; row.style.background = ""; }, 800); 
            };
            row.innerHTML = `<span class="lbl">${label}:</span><span class="val decrypt-target ${customClass}" data-val="${cleanVal}">00000</span>`;
            return row;
        }

        let radarPingInterval;
        async function startRadar() {
            initAudio(); playBeep(400, 'square', 0.2);
            document.getElementById('auth').style.display = 'none'; 
            const r = document.getElementById('radar-screen');
            r.style.display = 'flex'; r.style.opacity = '1';

            radarPingInterval = setInterval(() => playBeep(900, 'sine', 0.1, 0.02), 1500);

            let p = 0; const pb = document.getElementById('progress-bar');
            const rt = document.getElementById('radar-text');
            
            const progInt = setInterval(() => { p += Math.random() * 25; if(p > 85) p = 85; pb.style.width = p + '%'; }, 100);

            const wakeupTimeout = setTimeout(() => {
                if(p <= 85) { rt.innerText = "WAKING UP SERVER (COLD START)..."; rt.style.color = "#ffcc00"; }
            }, 4000);

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);
                
                const res = await fetch(`${BACKEND}/api/scan?target=${encodeURIComponent(target)}&type=${type}&uid=${uid}`, { signal: controller.signal });
                clearTimeout(timeoutId); clearTimeout(wakeupTimeout);
                
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                
                clearInterval(progInt); clearInterval(radarPingInterval); pb.style.width = '100%'; 
                rt.innerText = "TARGET ACQUIRED"; rt.style.color = "var(--neon)";
                playBeep(1500, 'square', 0.3, 0.1); 
                
                setTimeout(() => {
                    r.style.opacity = '0';
                    setTimeout(() => { r.style.display = 'none'; document.getElementById('laser').style.display='block'; loadDashboard(data); }, 200);
                }, 300); 

            } catch(e) {
                clearInterval(progInt); clearTimeout(wakeupTimeout); clearInterval(radarPingInterval);
                rt.innerText = e.name === 'AbortError' ? "UPLINK TIMEOUT" : "DB_ERROR (CHECK NETWORK ACCESS)"; 
                rt.style.color = "var(--danger)"; pb.style.background = "var(--danger)";
                playBeep(200, 'sawtooth', 0.5, 0.1); 
            }
        }

        async function loadDashboard(data) {
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('logs').style.display = 'block';
            document.getElementById('target-display').innerText = `TARGET: ${target}`;
            const db = document.getElementById('dashboard');

            await typeLog("INITIATING ARCHON INTELLIGENCE PROTOCOLS...");
            await typeLog("BYPASSING ENCRYPTION...");
            await typeLog("DATA STREAM DECRYPTED.");

            let m0 = document.createElement('div'); m0.className = 'module'; apply3DTilt(m0);
            m0.innerHTML = `<h4 style="margin:0 0 10px 0; color:var(--neon); border-bottom:1px solid #222; padding-bottom:5px; letter-spacing:1px;">[ CHRONOS_MEMORY ]</h4>`;
            m0.appendChild(buildRow('DATABASE RECORD', data.db_status, 'found'));
            db.appendChild(m0);
            setTimeout(() => { m0.classList.add('show'); m0.querySelectorAll('.decrypt-target').forEach(el => decryptText(el, el.getAttribute('data-val'))); playBeep(1000, 'sine', 0.1); }, 100);

            // ---> EXPANDED SOCIAL MEDIA GRID <---
            if(data.profiles_found) {
                let m_recon = document.createElement('div'); m_recon.className = 'module'; apply3DTilt(m_recon);
                m_recon.innerHTML = `<h4 style="margin:0 0 10px 0; color:var(--danger); border-bottom:1px solid #222; padding-bottom:5px; letter-spacing:1px;">[ SOCIAL_ENUMERATION ]</h4>`;
                
                if (data.profiles_found.Status) { m_recon.appendChild(buildRow('GHOST STATUS', 'TARGET IS COMPLETELY DARK', 'danger')); } 
                else {
                    let grid = document.createElement('div'); grid.className = 'social-grid';
                    for (const [platform, url] of Object.entries(data.profiles_found)) {
                        grid.innerHTML += `<div class="social-btn" onclick="playBeep(600,'square',0.1); window.open('${url}')">${platform.toUpperCase()}</div>`;
                    }
                    m_recon.appendChild(grid);
                }
                db.appendChild(m_recon);
                setTimeout(() => { m_recon.classList.add('show'); playBeep(1000, 'sine', 0.1); }, 300);
            }

            let m1 = document.createElement('div'); m1.className = 'module'; apply3DTilt(m1);
            m1.innerHTML = `<h4 style="margin:0 0 10px 0; color:var(--neon); border-bottom:1px solid #222; padding-bottom:5px; letter-spacing:1px;">[ PRIMARY_INTEL ]</h4>`;
            
            if(data.telegram?.id) { m1.appendChild(buildRow('TELEGRAM ID', data.telegram.id, 'found')); m1.appendChild(buildRow('ID LENGTH', data.telegram.format)); m1.appendChild(buildRow('EST. CREATION', data.telegram.est_creation, 'danger')); }
            if(data.ip) { m1.appendChild(buildRow('IP ADDRESS', data.ip)); }
            if(data.network?.isp) { m1.appendChild(buildRow('ISP', data.network.isp)); m1.appendChild(buildRow('CITY', data.network.city)); }
            if(data.corporate?.name) { m1.appendChild(buildRow('LEGAL ENTITY', data.corporate.name, 'found')); m1.appendChild(buildRow('DOMAIN', data.corporate.domain)); }
            if(data.imei?.tac) { m1.appendChild(buildRow('IMEI VALID', data.imei.valid ? 'TRUE' : 'FALSE', data.imei.valid ? 'found' : 'danger')); m1.appendChild(buildRow('TAC CODE', data.imei.tac)); }
            
            if(m1.childElementCount > 1) {
                db.appendChild(m1);
                setTimeout(() => { m1.classList.add('show'); m1.querySelectorAll('.decrypt-target').forEach(el => decryptText(el, el.getAttribute('data-val'))); playBeep(1000, 'sine', 0.1); }, 500);
            }

            let m3 = document.createElement('div'); m3.className = 'module'; apply3DTilt(m3);
            m3.innerHTML = `<h4 style="margin:0 0 5px 0; color:var(--neon); letter-spacing:1px;">[ TACTICAL_COMMANDS ]</h4>`;
            
            if (type === 'ip') {
                m3.innerHTML += `<div class="btn" style="border-color:#ffcc00; color:#ffcc00;" onclick="playBeep(600,'square',0.1); window.open('https://www.shodan.io/host/${data.target}')">SHODAN IOT UPLINK</div>`;
            }
            m3.innerHTML += `<div class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="playBeep(200,'sawtooth',0.2); if(tg) tg.close()">GENERATE TRAP LINK</div>`;
            
            db.appendChild(m3);
            setTimeout(() => { m3.classList.add('show'); playBeep(1000, 'sine', 0.1); }, 800);
        }
    </script>
</body>
</html>
