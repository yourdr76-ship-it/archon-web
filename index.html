<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.95); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow:hidden; height:100vh; width:100vw; }
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.25; }
        #noise { position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; opacity:0; pointer-events:none; background: repeating-linear-gradient(0deg, rgba(0,255,204,0.05) 0px, transparent 1px); }
        .ripping #noise { opacity: 0.3; animation: jitter 0.1s infinite; }
        @keyframes jitter { 0% { opacity:0.2; transform:translateY(0); } 50% { opacity:0.4; transform:translateY(2px); } }

        .interface { position: relative; z-index: 10; padding: 20px; height: 100vh; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; }
        .cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .proto-btn { 
            background: rgba(0, 255, 204, 0.1); border: 1px solid var(--neon); color: var(--neon);
            padding: 18px; font-size: 11px; letter-spacing: 2px; cursor: pointer; text-align: left;
            clip-path: polygon(0% 0%, 92% 0%, 100% 25%, 100% 100%, 0% 100%);
        }
        
        #stream { flex-grow: 1; overflow-y: auto; margin-top: 20px; scrollbar-width: none; }
        .card { background: var(--glass); border-left: 5px solid var(--neon); padding: 22px; margin-bottom: 15px; animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        
        .row { display: flex; justify-content: space-between; font-size: 12px; padding: 7px 0; border-bottom: 1px dashed rgba(0, 255, 204, 0.2); }
        .val { color: var(--neon); font-weight: bold; text-shadow: 0 0 10px var(--neon); }
        .prov-tag { font-size: 9px; color: #fff; opacity: 0.5; margin-top: 10px; }

        .access-panel { border: 1px solid #ff3333; padding: 15px; margin-top: auto; margin-bottom: 15px; text-align: center; background: rgba(255,0,0,0.05); cursor: pointer;}
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div id="noise"></div>
    <div class="interface">
        <div style="letter-spacing:10px; color:var(--neon); font-size:10px; font-weight:900;">ARCHON INTELLIGENCE</div>
        <div id="target-id" style="font-size:26px; margin: 10px 0; font-weight:bold;">TARGET: ---</div>

        <div class="cluster">
            <button class="proto-btn" onclick="startChain()">SINGULARITY RIP</button>
            <button class="proto-btn" onclick="location.reload()">RESET SYSTEM</button>
        </div>

        <div id="stream"></div>

        <div class="access-panel" id="access-box" onclick="grantAccess()">
            <div id="access-btn" style="color: #ff3333; font-size: 12px; font-weight: bold;">[ ESTABLISH SECURE UPLINK ]</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com"; 
        document.getElementById('target-id').innerText = target || "IDLE";

        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.rate = 1.1; window.speechSynthesis.speak(u); }

        async function grantAccess() {
            const btn = document.getElementById('access-btn');
            btn.innerText = "[ PINGING SERVER... ]";
            try {
                const r = await fetch(BACKEND);
                if(r.ok) {
                    window.authorized = true;
                    document.getElementById('access-box').style.borderColor = "#00ffcc";
                    document.getElementById('access-box').innerHTML = "<div style='color:#00ffcc; font-size:11px; font-weight:bold;'>UPLINK STATUS: SECURE</div>";
                    tg.HapticFeedback.notificationOccurred('success');
                    speak("Uplink established. Archon Intelligence is synchronized.");
                }
            } catch(e) {
                btn.innerText = "[ SERVER SLEEPING... RETRY ]";
                speak("Server node is offline. Re-initializing.");
            }
        }

        async function startChain() {
            if(!window.authorized) return tg.showAlert("Manual Access Required: Establish Uplink.");
            let proto = target.includes('@') ? "email" : (target.match(/\d+\./) ? "ip" : "username");
            executeRip(target, proto);
        }

        async function executeRip(node, proto) {
            document.body.classList.add('ripping');
            coreSpeed = 0.15;
            speak(`Ripping ${proto} node.`);

            try {
                // Cache-buster added to ensure fresh extraction
                const res = await fetch(`${BACKEND}/api/scan?target=${node}&protocol=${proto}&v=${Date.now()}`);
                const data = await res.json();
                
                renderDossier(proto.toUpperCase(), data);

                // --- ⚡ AUTOMATIC CHAIN REACTION ---
                if(data.pivots && data.pivots.length > 0) {
                    data.pivots.forEach(piv => {
                        setTimeout(() => executeRip(piv.t, piv.p), 4000);
                    });
                } else {
                    setTimeout(() => {
                        document.body.classList.remove('ripping');
                        coreSpeed = 0.005;
                        speak("Dossier complete.");
                    }, 2000);
                }
            } catch (e) {
                document.body.classList.remove('ripping');
                tg.showAlert("Uplink Time-out.");
            }
        }

        function renderDossier(title, data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="color:var(--neon); font-size:10px; margin-bottom:12px; letter-spacing:2px;">[ ${title}_ANALYSIS ]</div>`;
            
            Object.entries(data.analysis).forEach(([k, v]) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<span>${k.replace('_', ' ')}</span><span class="val" id="rip-${title}-${k}">---</span>`;
                card.appendChild(row);
                decipher(document.getElementById(`rip-${title}-${k}`), String(v));
            });

            data.provenance.forEach(s => {
                const pt = document.createElement('div');
                pt.className = 'prov-tag';
                pt.innerText = `SOURCE: ${s.src} | HITS: ${s.hits}`;
                card.appendChild(pt);
            });

            document.getElementById('stream').prepend(card);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function decipher(el, val) {
            const chars = "ABCDEFGHIJKLMN0123456789!@#$%&*";
            let i = 0;
            const interval = setInterval(() => {
                el.innerText = val.split("").map((c, idx) => idx < i ? val[idx] : chars[Math.floor(Math.random()*chars.length)]).join("");
                if(i >= val.length) clearInterval(interval);
                i += 1/3;
            }, 30);
        }

        // --- 🧊 THREE.JS ---
        let coreSpeed = 0.005;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += coreSpeed; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
