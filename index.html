<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.98); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow:hidden; height:100vh; }
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.2; }
        .interface { position: relative; z-index: 10; padding: 25px; height: 100vh; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }
        #status-bar { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 10px; }
        .target-display { font-size: 24px; margin: 10px 0; font-weight: bold; border-bottom: 1px solid rgba(0,255,204,0.3); padding-bottom: 10px; }
        .cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .proto-btn { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--neon); color: var(--neon); padding: 20px; font-size: 11px; letter-spacing: 2px; cursor: pointer; text-align: left; clip-path: polygon(0% 0%, 92% 0%, 100% 25%, 100% 100%, 0% 100%); }
        #stream { flex-grow: 1; overflow-y: auto; margin-top: 20px; scrollbar-width: none; }
        .card { background: var(--glass); border-left: 4px solid var(--neon); padding: 20px; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; font-size: 12px; padding: 8px 0; border-bottom: 1px dashed rgba(0, 255, 204, 0.15); }
        .val { color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div class="interface">
        <div id="status-bar">UPLINK_STATUS: READY</div>
        <div class="target-display" id="target-id">TARGET: ---</div>
        <div class="cluster">
            <button class="proto-btn" onclick="initializeRip()">INITIALIZE RIP</button>
            <button class="proto-btn" onclick="location.reload()">RESET NODE</button>
        </div>
        <div id="stream"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        try { tg.expand(); } catch(e){}
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        document.getElementById('target-id').innerText = target || "IDLE";

        async function initializeRip() {
            document.getElementById('status-bar').innerText = "UPLINK_STATUS: FETCHING DATA (Wait up to 60s)...";
            document.getElementById('status-bar').style.color = "#ffaa00";
            let proto = target.includes('@') ? "email" : (target.match(/\d+\./) ? "ip" : "username");

            try {
                // Pure, simple fetch. No voice. No bullshit.
                const res = await fetch(`${BACKEND}/api/scan?target=${target}&protocol=${proto}&v=${Date.now()}`);
                if(!res.ok) throw new Error(`HTTP ERROR: ${res.status}`);
                
                const data = await res.json();
                
                document.getElementById('status-bar').innerText = "UPLINK_STATUS: DATA_SECURED";
                document.getElementById('status-bar').style.color = "#00ffcc";
                renderCard(proto.toUpperCase(), data);
            } catch (e) { 
                document.getElementById('status-bar').innerText = "UPLINK_STATUS: FAILED. TAP TO RETRY.";
                document.getElementById('status-bar').style.color = "#ff3333";
                alert("If this failed, Render is currently booting up. Wait 45 seconds and tap Initialize Rip again. Error: " + e.message);
            }
        }

        function renderCard(title, data) {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<div style="color:var(--neon); font-size:9px; margin-bottom:12px; letter-spacing:2px;">[ ${title}_ANALYSIS ]</div>`;
            
            Object.entries(data.analysis).forEach(([k, v]) => {
                const row = document.createElement('div'); row.className = 'row';
                row.innerHTML = `<span>${k.toUpperCase()}</span><span class="val">${v}</span>`;
                card.appendChild(row);
            });
            document.getElementById('stream').prepend(card);
        }

        let coreSpeed = 0.005;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += coreSpeed; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
