<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARCHON COMMAND</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #000; --glass: rgba(0, 10, 5, 0.98); }
        body { margin:0; background:var(--bg); color:#fff; font-family:monospace; overflow:hidden; height:100vh; }
        #canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; opacity:0.2; }
        
        /* Stealth Interface */
        .interface { position: relative; z-index: 10; padding: 25px; height: 100vh; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; }
        
        /* Status Bar (Replaces Error Box) */
        #status-bar { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 10px; opacity: 0.6; }
        
        .target-display { font-size: 24px; margin: 10px 0; font-weight: bold; border-bottom: 1px solid rgba(0,255,204,0.3); padding-bottom: 10px; }

        .cluster { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .proto-btn { 
            background: rgba(0, 255, 204, 0.05); border: 1px solid var(--neon); color: var(--neon);
            padding: 18px; font-size: 11px; letter-spacing: 2px; cursor: pointer; text-align: left;
            clip-path: polygon(0% 0%, 92% 0%, 100% 25%, 100% 100%, 0% 100%);
            transition: 0.3s;
        }
        .proto-btn:active { background: var(--neon); color: #000; }

        #stream { flex-grow: 1; overflow-y: auto; margin-top: 20px; scrollbar-width: none; }
        .card { background: var(--glass); border-left: 4px solid var(--neon); padding: 20px; margin-bottom: 15px; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .row { display: flex; justify-content: space-between; font-size: 12px; padding: 7px 0; border-bottom: 1px dashed rgba(0, 255, 204, 0.1); }
        .val { color: var(--neon); font-weight: bold; }
        
        /* Glitch Layer */
        #noise { position:fixed; top:0; left:0; width:100%; height:100%; z-index:5; opacity:0; pointer-events:none; background: repeating-linear-gradient(0deg, rgba(0,255,204,0.05) 0px, transparent 1px); }
        .ripping #noise { opacity: 0.4; animation: jitter 0.1s infinite; }
        @keyframes jitter { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }
    </style>
</head>
<body>
    <div id="canvas"></div>
    <div id="noise"></div>
    <div class="interface">
        <div id="status-bar">UPLINK_STATUS: STABILIZING...</div>
        <div class="target-display" id="target-id">TARGET: ---</div>

        <div class="cluster">
            <button class="proto-btn" id="rip-btn" onclick="initializeRip()">INITIALIZE RIP</button>
            <button class="proto-btn" onclick="location.reload()">RESET NODE</button>
        </div>

        <div id="stream"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const p = new URLSearchParams(window.location.search);
        const target = p.get('target');
        const BACKEND = "https://archon-intelligence-backend.onrender.com";
        document.getElementById('target-id').innerText = target;

        // --- 🛰️ STEALTH AUTO-HANDSHAKE ---
        let systemReady = false;
        (async function stealthWake() {
            const status = document.getElementById('status-bar');
            while(!systemReady) {
                try {
                    const r = await fetch(BACKEND);
                    if(r.ok) {
                        systemReady = true;
                        status.innerText = "UPLINK_STATUS: SECURE [CALIBRATION_COMPLETE]";
                        tg.HapticFeedback.impactOccurred('medium');
                    }
                } catch(e) {
                    status.innerText = "UPLINK_STATUS: CALIBRATING_NODES...";
                }
                await new Promise(res => setTimeout(res, 3000));
            }
        })();

        async function initializeRip() {
            if(!systemReady) {
                tg.HapticFeedback.notificationOccurred('error');
                return; // Silently wait for the auto-handshake
            }
            let proto = target.includes('@') ? "email" : (target.match(/\d+\./) ? "ip" : "username");
            executeRecursiveRip(target, proto);
        }

        async function executeRecursiveRip(node, proto) {
            document.body.classList.add('ripping');
            coreSpeed = 0.15;

            try {
                const res = await fetch(`${BACKEND}/api/scan?target=${node}&protocol=${proto}`);
                const data = await res.json();
                
                renderCard(proto.toUpperCase(), data);

                // --- ⚡ AUTOMATIC CHAIN REACTION ---
                if(data.pivots && data.pivots.length > 0) {
                    data.pivots.forEach(piv => {
                        setTimeout(() => executeRecursiveRip(piv.t, piv.p), 4000);
                    });
                } else {
                    setTimeout(() => {
                        document.body.classList.remove('ripping');
                        coreSpeed = 0.005;
                    }, 2000);
                }
            } catch (e) { document.body.classList.remove('ripping'); }
        }

        function renderCard(title, data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div style="color:var(--neon); font-size:9px; margin-bottom:12px; letter-spacing:2px;">[ ${title}_ANALYSIS ]</div>`;
            
            Object.entries(data.analysis).forEach(([k, v]) => {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<span>${k.toUpperCase()}</span><span class="val" id="rip-${title}-${k}">---</span>`;
                card.appendChild(row);
                decipher(document.getElementById(`rip-${title}-${k}`), String(v));
            });

            document.getElementById('stream').prepend(card);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function decipher(el, val) {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
            let i = 0;
            const interval = setInterval(() => {
                el.innerText = val.split("").map((c, idx) => idx < i ? val[idx] : chars[Math.floor(Math.random()*chars.length)]).join("");
                if(i >= val.length) clearInterval(interval);
                i += 1/3;
            }, 30);
        }

        let coreSpeed = 0.005;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas').appendChild(renderer.domElement);
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 1), new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true }));
        scene.add(core); camera.position.z = 5;
        function animate() { requestAnimationFrame(animate); core.rotation.y += coreSpeed; renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
